name: Build macOS VST3/AU

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: Build on macOS
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Clone JUCE
      run: git clone https://github.com/juce-framework/JUCE.git JUCE

    - name: Configure CMake
      run: cmake -B build -G Xcode -DCMAKE_BUILD_TYPE=Release

    - name: Build Plugin
      run: cmake --build build --config Release --parallel

    - name: List build artefacts
      run: |
        echo "=== VST3 ==="
        find build -name "*.vst3" -type d 2>/dev/null || echo "brak"
        echo "=== AU ==="
        find build -name "*.component" -type d 2>/dev/null || echo "brak"

    - name: Package for distribution
      run: |
        VST3=$(find build -name "*.vst3" -type d | head -1)
        AU=$(find build -name "*.component" -type d | head -1)

        if [ -z "$VST3" ]; then
          echo "ERROR: nie znaleziono .vst3"
          exit 1
        fi

        mkdir -p dist
        cp -R "$VST3" dist/

        if [ -n "$AU" ]; then
          cp -R "$AU" dist/
        fi

        cp install.sh dist/
        chmod +x dist/install.sh
        cp INSTALACJA.txt dist/

        echo "=== Zawartosc dist ==="
        ls -la dist/

    - name: Create ZIP
      run: |
        zip -r SAT_76_macOS.zip dist/
        ls -lh SAT_76_macOS.zip

    - name: Upload macOS Package
      uses: actions/upload-artifact@v4
      with:
        name: SAT_76-macOS
        path: SAT_76_macOS.zip

