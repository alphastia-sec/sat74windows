name: Build Windows VST3

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    # 1. Pobranie kodu z GitHuba
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Pobranie frameworka JUCE
    - name: Clone JUCE
      run: git clone https://github.com/juce-framework/JUCE.git JUCE

    # 3. Konfiguracja projektu przy użyciu CMake
    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    # 4. Kompilacja wtyczki w trybie Release
    - name: Build Plugin
      run: cmake --build build --config Release

    # 6. Debug - pokaż DOKŁADNIE co zostało zbudowane
    - name: List build artefacts
      run: |
        Write-Host "=== Zawartosc folderu build ==="
        Get-ChildItem -Path build -Recurse | Select-Object FullName
      shell: pwsh

    # 7. Instalacja Inno Setup
    - name: Install Inno Setup
      run: choco install innosetup --yes --no-progress

    # 8. Znajdź VST3 i zbuduj instalator
    - name: Build Windows Installer
      shell: pwsh
      run: |
        Write-Host "=== Szukam pliku VST3 ==="
        $vst3 = Get-ChildItem -Path build -Recurse -Filter "*.vst3" | Select-Object -First 1
        if ($null -eq $vst3) {
          Write-Error "Nie znaleziono pliku .vst3 w folderze build!"
          exit 1
        }
        Write-Host "Znaleziono: $($vst3.FullName)"
        Write-Host "Folder: $($vst3.DirectoryName)"
        
        # Zaktualizuj ścieżkę w installer.iss
        $issContent = Get-Content installer.iss -Raw
        $newSource = "Source: `"$($vst3.FullName)\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs"
        $issContent = $issContent -replace 'Source: "[^"]*"; DestDir: "\{app\}".*', $newSource
        Set-Content installer.iss $issContent
        
        Write-Host "=== Zaktualizowany installer.iss ==="
        Get-Content installer.iss
        
        # Uruchom Inno Setup
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    # 8. Upload gotowego instalatora
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: SAT_76-Windows-Installer
        path: SAT_76_Windows_Installer.exe
