name: Build Windows VST3

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    # 1. Pobranie kodu z GitHuba
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Pobranie frameworka JUCE
    - name: Clone JUCE
      run: git clone https://github.com/juce-framework/JUCE.git JUCE

    # 3. Konfiguracja projektu przy użyciu CMake
    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    # 4. Kompilacja wtyczki w trybie Release
    - name: Build Plugin
      run: cmake --build build --config Release

    # 5. Debug - pokaż co zostało zbudowane (pomaga przy problemach ze ścieżkami)
    - name: List build artefacts
      run: |
        Get-ChildItem -Path build -Recurse -Filter "*.vst3" | Select-Object FullName
      shell: pwsh

    # 6. Instalacja Inno Setup
    - name: Install Inno Setup
      run: choco install innosetup --yes --no-progress

    # 7. Budowanie instalatora
    - name: Build Windows Installer
      shell: cmd
      run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

    # 8. Upload gotowego instalatora
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: SAT_76-Windows-Installer
        path: SAT_76_Windows_Installer.exe
